name: Win Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Build version label for artifacts
        required: false
        type: string
        default: USTBL-0.1.0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build-Windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
          - os: windows-latest
            target: i686-pc-windows-msvc
            arch: i686
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate ICO metadata
        shell: pwsh
        run: |
          $iconPath = "src-tauri/assets/icons/icon.ico"
          if (-not (Test-Path $iconPath)) {
            throw "Icon file not found: $iconPath"
          }

          $bytes = [System.IO.File]::ReadAllBytes($iconPath)
          if ($bytes.Length -lt 6) {
            throw "Invalid ICO file: too small ($($bytes.Length) bytes)"
          }

          $entryCount = [BitConverter]::ToUInt16($bytes, 4)
          if ($entryCount -lt 1) {
            throw "Invalid ICO file: no icon entries"
          }

          for ($i = 0; $i -lt $entryCount; $i++) {
            $entryOffset = 6 + (16 * $i)
            if ($bytes.Length -lt ($entryOffset + 16)) {
              throw "Invalid ICO file: incomplete ICONDIRENTRY at index $i"
            }

            $reserved = $bytes[$entryOffset + 3]
            if ($reserved -ne 0) {
              throw ("Invalid ICO reserved field at entry {0}: {1} (must be 0)" -f $i, $reserved)
            }
          }

          Write-Host "ICO validation passed for $iconPath ($entryCount entries)."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.os }}-${{ matrix.target }}

      - name: Build the app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Patch portable executable
        shell: bash
        run: |
          python scripts/release/bundle_portable_assets.py -p "src-tauri/target/${{ matrix.target }}/release/" -o "USTBL-patched.exe" "USTBL.exe"

      - name: Setup artifact name
        shell: bash
        run: |
          echo "ARTIFACT_NAME=${{ github.event.inputs.version || 'USTBL-0.1.0' }}_windows_${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Calculate SHA256 checksums
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.ARTIFACT_NAME }}"
          touch "${ARTIFACT_NAME}.sha256"

          echo "$(sha256sum src-tauri/target/${{ matrix.target }}/release/USTBL.exe | awk '{print $1}') ${ARTIFACT_NAME}" >> "${ARTIFACT_NAME}.sha256"
          echo "$(sha256sum src-tauri/target/${{ matrix.target }}/release/USTBL-patched.exe | awk '{print $1}') ${ARTIFACT_NAME}_portable" >> "${ARTIFACT_NAME}.sha256"

          cat "${ARTIFACT_NAME}.sha256"

      - name: Prepare artifact
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.ARTIFACT_NAME }}"
          mkdir artifacts

          cp "${ARTIFACT_NAME}.sha256" artifacts/
          mv "src-tauri/target/${{ matrix.target }}/release/USTBL-patched.exe" artifacts/"${ARTIFACT_NAME}"_portable.exe
          mv "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/"*.exe artifacts/"${ARTIFACT_NAME}"_setup.exe

          ls -la artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/*
          if-no-files-found: error
